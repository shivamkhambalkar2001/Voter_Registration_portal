{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Voter</h2>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'voter_list' %}" class="btn btn-secondary">Back to List</a>
        </form>
    </div>
</div>
{% endblock %}
