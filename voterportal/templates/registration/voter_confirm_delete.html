{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Confirm Delete</h2>
    </div>
    <div class="card-body">
        <p>Are you sure you want to delete "{{ voter.first_name }} {{ voter.last_name }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'voter_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
